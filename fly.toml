# Fly.io app configuration
# Server stays always on (min_machines_running = 1) so the CGM sync runs every 1 hour.
app = "cgm-insights-api"
primary_region = "cdg"

[build]

[env]
  PORT = "3000"
  APP_ENV = "production"
  RUST_LOG = "info"

[http_service]
  internal_port = 3000
  force_https = true
  processes = ["app"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1