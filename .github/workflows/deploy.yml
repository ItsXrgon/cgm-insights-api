# Deploy to Fly.io on push to main
name: Deploy

on:
  push:
    branches: [main, master]

# Cancel in-progress deploy when a newer commit is pushed to the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: |
          GIT_REV=$(echo ${{ github.sha }} | cut -c1-7)
          flyctl deploy --remote-only --build-arg "GIT_REV_SHORT=$GIT_REV"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
