# CI: build, test, and lint on push and pull requests
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Dummy values so config/startup don't require real secrets (we don't run the server in CI)
  DATABASE_URL: "postgres://user:pass@localhost:5432/db"
  JWT_SECRET: "ci-dummy-secret-min-32-chars-long"

jobs:
  check:
    name: Check & Test & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux

      - name: Check
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
